<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2e3144;
      --accent:    #6c63ff;
      --accent-h:  #5a52e0;
      --text:      #e8eaf0;
      --muted:     #7b8099;
      --success:   #22c55e;
      --error:     #ef4444;
      --input-bg:  #12151f;
      --radius:    8px;
    }

    body {
      width: 380px;
      min-height: 200px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    .header-title svg { flex-shrink: 0; }
    .btn-icon {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
    }
    .btn-icon:hover { color: var(--text); background: var(--border); }

    /* ── Views ── */
    .view { display: none; padding: 14px 16px 16px; }
    .view.active { display: block; }

    /* ── Form ── */
    .form-row { margin-bottom: 10px; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    input, select, textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
    }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    textarea { resize: vertical; min-height: 56px; line-height: 1.4; }
    select option { background: var(--surface); }

    .url-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .url-row input { flex: 1; min-width: 0; }
    .url-badge {
      flex-shrink: 0;
      font-size: 10px;
      background: var(--border);
      color: var(--muted);
      padding: 2px 6px;
      border-radius: 99px;
    }

    /* ── Status badge colors ── */
    select#status option[value="Applied"]       { color: #93c5fd; }
    select#status option[value="Phone Screen"]  { color: #fbbf24; }
    select#status option[value="Interviewing"]  { color: #a78bfa; }
    select#status option[value="Offer"]         { color: #4ade80; }
    select#status option[value="Rejected"]      { color: #f87171; }
    select#status option[value="Ghosted"]       { color: #6b7280; }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Toast ── */
    #toast {
      display: none;
      margin-top: 10px;
      padding: 9px 12px;
      border-radius: var(--radius);
      font-size: 12.5px;
      font-weight: 500;
      text-align: center;
    }
    #toast.success { background: #14532d; color: var(--success); border: 1px solid #166534; }
    #toast.error   { background: #450a0a; color: var(--error);   border: 1px solid #7f1d1d; }

    /* ── Spinner ── */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Settings view ── */
    .settings-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 14px;
      color: var(--text);
    }
    .settings-help {
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 14px;
      padding: 9px 10px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .settings-help code {
      font-family: monospace;
      background: var(--border);
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 11px;
    }
    .btn-secondary {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 7px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: var(--border); }
    .settings-actions { display: flex; gap: 8px; margin-top: 4px; }
    .settings-actions .btn-primary { margin-top: 0; }

    /* ── First-run state ── */
    .first-run {
      text-align: center;
      padding: 24px 16px;
    }
    .first-run-icon { font-size: 32px; margin-bottom: 12px; }
    .first-run h2 { font-size: 15px; margin-bottom: 6px; }
    .first-run p { color: var(--muted); font-size: 12px; line-height: 1.5; margin-bottom: 16px; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6c63ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
      </svg>
      Job Tracker
    </div>
    <button class="btn-icon" id="btnSettings" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- ── Main Form View ── -->
  <div class="view active" id="viewMain">

    <!-- Row: Company + Role -->
    <div class="form-row-2">
      <div>
        <label for="company">Company</label>
        <input type="text" id="company" placeholder="Google" />
      </div>
      <div>
        <label for="role">Role</label>
        <input type="text" id="role" placeholder="Software Engineer" />
      </div>
    </div>

    <!-- URL -->
    <div class="form-row">
      <label for="link">Job Posting URL</label>
      <div class="url-row">
        <input type="url" id="link" placeholder="https://..." readonly />
        <span class="url-badge" id="urlSource">current tab</span>
      </div>
    </div>

    <!-- Row: Status + Date -->
    <div class="form-row-2">
      <div>
        <label for="status">Status</label>
        <select id="status">
          <option value="Applied">Applied</option>
          <option value="Phone Screen">Phone Screen</option>
          <option value="Interviewing">Interviewing</option>
          <option value="Offer">Offer</option>
          <option value="Rejected">Rejected</option>
          <option value="Ghosted">Ghosted</option>
        </select>
      </div>
      <div>
        <label for="dateApplied">Date Applied</label>
        <input type="date" id="dateApplied" />
      </div>
    </div>

    <!-- Row: Location + Salary -->
    <div class="form-row-2">
      <div>
        <label for="location">Location</label>
        <input type="text" id="location" placeholder="Remote / NYC" />
      </div>
      <div>
        <label for="salary">Salary</label>
        <input type="text" id="salary" placeholder="$120k–$160k" />
      </div>
    </div>

    <!-- Row: Contact + Resume -->
    <div class="form-row-2">
      <div>
        <label for="contact">Contact Info</label>
        <input type="text" id="contact" placeholder="recruiter@co.com" />
      </div>
      <div>
        <label for="resume">Resume Version</label>
        <input type="text" id="resume" placeholder="v3_backend" />
      </div>
    </div>

    <!-- Notes -->
    <div class="form-row">
      <label for="notes">Notes</label>
      <textarea id="notes" placeholder="Referral, key requirements, next steps…"></textarea>
    </div>

    <button class="btn-primary" id="btnLog">
      <span id="btnText">Log Application</span>
      <div class="spinner" id="spinner"></div>
    </button>
    <div id="toast"></div>
  </div>

  <!-- ── Settings View ── -->
  <div class="view" id="viewSettings">
    <div class="settings-title">Settings</div>

    <div class="settings-help">
      Find your <strong>Spreadsheet ID</strong> in the Google Sheets URL:<br/>
      <code>docs.google.com/spreadsheets/d/<strong>YOUR_ID_HERE</strong>/edit</code>
    </div>

    <div class="form-row">
      <label for="cfgSheetId">Spreadsheet ID</label>
      <input type="text" id="cfgSheetId" placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms" />
    </div>
    <div class="form-row">
      <label for="cfgSheetName">Sheet Tab Name</label>
      <input type="text" id="cfgSheetName" placeholder="Sheet1" />
    </div>

    <div class="settings-actions">
      <button class="btn-secondary" id="btnSettingsCancel">Cancel</button>
      <button class="btn-primary" id="btnSettingsSave">Save Settings</button>
    </div>
    <div id="settingsToast"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
